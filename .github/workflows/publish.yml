name: Publish Package

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi

          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          dist_tag="$(node -p "require('./package.json').version.includes('-') ? 'next' : 'latest'")"

          if [ "$tag" != "$version" ] && [ "$tag" != "v$version" ]; then
            echo "::error::Git tag '$tag' must match package.json version '$version' (expected '$version' or 'v$version')."
            exit 1
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: pnpm exec eslint ./src

      - name: Build
        run: pnpm build

      - name: Check package contents
        run: npm pack --dry-run

      - name: Check npm version
        id: npm
        shell: bash
        run: |
          set -euo pipefail

          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.package.outputs.version }} is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        run: npm publish --tag "${{ steps.package.outputs.dist_tag }}" --ignore-scripts
